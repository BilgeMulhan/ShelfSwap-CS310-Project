name: shelfswap_flutter_project
description: ShelfSwap UI implementation for CS310 Step 3
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/placeholder_item.png
    - assets/images/CalculusBook.png
    - assets/images/Headphones.png
    - assets/images/ReadingBook.png
    - assets/images/VintageLamp.png



